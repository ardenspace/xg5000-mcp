  inverter_6_freq_cmd:        { area: input_register, address: 610, count: 1, data_type: uint16, unit: hz, description: "Inverter 6 output freq 0-60 [D00610]" }
  inverter_7_start_stop_cmd:  { area: input_register, address: 112, count: 1, data_type: uint16, description: "Inverter 7 start/stop (1=stop,2=run) [D00112] — extrapolated, verify" }
