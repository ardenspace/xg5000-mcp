  # ----------------------------------------------------------------------------
  # Box detection photosensors (P02~P04 -> offset 2~4)
  # ----------------------------------------------------------------------------
  box_1_detect:
    area: discrete_input
    address: 2              # P02
    count: 1
    data_type: bool
    description: "Box 1 detect (1번 박스)"
  box_2_detect:
    area: discrete_input
    address: 3              # P03
    count: 1
    data_type: bool
    description: "Box 2 detect (2번 박스)"
  box_spare_detect:
    area: discrete_input
    address: 4              # P04
    count: 1
    data_type: bool
    description: "Spare box detect (예비용 박스, 다음 사이클 대기)"

