# Taesung cabinet — XG5000 PLC (XBC-DR64H) Modbus TCP point map
#
# Source: PLC author's hardware doc + I/O mapping table + XG5000 Modbus server
# settings, reviewed 2026-06-05. See docs/FIELD-COMMISSIONING.md.
#
# ADDRESSING MODEL (LS XBL-EMTA Modbus server, base-address + offset):
#   - 비트 읽기 영역 시작 = P00000  -> ALL physical P-area I/O (inputs AND outputs)
#       read via `read_discrete_inputs` (FC02). offset = P_word * 16 + P_bit(hex).
#       NOTE: physical outputs (P20~P28, words 2) sit inside this read window, so
#       output states are read as discrete inputs too — NOT via read_coils.
#       (비트 쓰기 영역 P01000 is an empty scratch area; read_coils is meaningless.)
#   - 워드 읽기 영역 시작 = D00000 -> D-area words read via `read_input_registers`
#       (FC04). Modbus register N = D-word N (1:1).
#
# ⚠️ VERIFY ON SITE: assumes 0-based offsets (Modbus offset 0 == P0000.0 /
#    register 0 == D0000). LS firmware has shifted 0-based<->1-based before.
#    Do a physical toggle test before trusting values (see FIELD-COMMISSIONING.md).

points:

  # ----------------------------------------------------------------------------
  # Inverter status (D-area words, read_input_registers, base D00000)
  # Per the P2P 01 (built-in Cnet, ch2 Modbus RTU client) block table, each
  # inverter (상대국번 N) is driven by two WRITE blocks:
  #   start/stop -> inverter reg 0x40005, PLC source D(100 + 2*(N-1))  (1=stop, 2=run)
  #   frequency  -> inverter reg 0x40004, PLC source D(600 + 2*(N-1))  (0-60 Hz)
  # We read those PLC source D-words (Modbus input_register addr == D-word number).
  # 국번 1~6 confirmed from the table/ladder; 7~16 extrapolated by the same +2
  # step — VERIFY against the full P2P table on site. RS485 max 16 inverters
  # (17 installed; 1 inverter is manual-control only, no P2P block).
  # ----------------------------------------------------------------------------
  inverter_1_start_stop_cmd:  { area: input_register, address: 100, count: 1, data_type: uint16, description: "Inverter 1 start/stop (1=stop,2=run) [D00100]" }
  inverter_1_freq_cmd:        { area: input_register, address: 600, count: 1, data_type: uint16, unit: hz, description: "Inverter 1 output freq 0-60 [D00600]" }
  inverter_2_start_stop_cmd:  { area: input_register, address: 102, count: 1, data_type: uint16, description: "Inverter 2 start/stop (1=stop,2=run) [D00102]" }
  inverter_2_freq_cmd:        { area: input_register, address: 602, count: 1, data_type: uint16, unit: hz, description: "Inverter 2 output freq 0-60 [D00602]" }
  inverter_3_start_stop_cmd:  { area: input_register, address: 104, count: 1, data_type: uint16, description: "Inverter 3 start/stop (1=stop,2=run) [D00104]" }
  inverter_3_freq_cmd:        { area: input_register, address: 604, count: 1, data_type: uint16, unit: hz, description: "Inverter 3 output freq 0-60 [D00604]" }
  inverter_4_start_stop_cmd:  { area: input_register, address: 106, count: 1, data_type: uint16, description: "Inverter 4 start/stop (1=stop,2=run) [D00106]" }
  inverter_4_freq_cmd:        { area: input_register, address: 606, count: 1, data_type: uint16, unit: hz, description: "Inverter 4 output freq 0-60 [D00606]" }
  inverter_5_start_stop_cmd:  { area: input_register, address: 108, count: 1, data_type: uint16, description: "Inverter 5 start/stop (1=stop,2=run) [D00108]" }
  inverter_5_freq_cmd:        { area: input_register, address: 608, count: 1, data_type: uint16, unit: hz, description: "Inverter 5 output freq 0-60 [D00608]" }
